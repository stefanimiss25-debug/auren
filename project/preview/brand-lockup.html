<!doctype html><html><head><meta charset="utf-8"/>
<title>AUREN · Logo lockup</title>
<link rel="stylesheet" href="_card.css"/>
<style>
body { padding: 22px 28px; display: grid; place-items: center; overflow: hidden; }
.lockup { display: grid; place-items: center; gap: 0; max-width: 100%; }
.lockup img {
  width: 100%; max-width: 580px; height: auto; display: block;

  margin-top: 10px;

</style>
</head><body>
<div class="lockup">
  <img src="../assets/auren-lockup.png" alt="AUREN — Studio of visual renewal — 14 days to new"/>
