<!doctype html><html><head><meta charset="utf-8"/>
<title>AUREN · Color usage</title>
<link rel="stylesheet" href="_card.css"/>
<style>
body { padding: 0; background: var(--auren-milk); }
.frame { padding: 28px 32px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 28px; align-items: center; min-height: 220px; }
.demo { position: relative; }
.headline { font-family: var(--auren-display); font-size: 56px; line-height: 0.96; letter-spacing: -0.02em; margin: 0; }
.headline .spark { color: var(--auren-lime-deep); }
.eye { font: var(--auren-eyebrow); letter-spacing: 0.22em; text-transform: uppercase; color: var(--auren-fg-3); margin-bottom: 10px; }
.btn { display: inline-flex; align-items: center; gap: 10px; margin-top: 14px; padding: 12px 18px; border-radius: 999px; background: var(--auren-ink); color: var(--auren-on-dark-1); font: 600 13px/1 var(--auren-sans); letter-spacing: 0.06em; text-transform: uppercase; box-shadow: var(--auren-glow-lime); }
.btn span.spark { width: 8px; height: 8px; border-radius: 999px; background: var(--auren-lime); box-shadow: 0 0 12px var(--auren-lime); }
/* Floating glow blobs */
.blob { position: absolute; border-radius: 50%; filter: blur(40px); pointer-events: none; }
.blob.l { width: 180px; height: 180px; background: var(--auren-lavender-glow); top: -20px; right: -20px; }
.blob.g { width: 120px; height: 120px; background: var(--auren-lime-glow); bottom: -10px; left: 30%; opacity: 0.7; }
.principles { display: grid; gap: 8px; font: var(--auren-body-sm); color: var(--auren-fg-2); border-left: 2px solid var(--auren-lime); padding-left: 14px; }
.principles b { color: var(--auren-fg-1); font-weight: 600; }
</style>
</head><body>
<div class="frame">
  <div class="demo">
    <div class="blob l"></div>
    <div class="blob g"></div>
    <div class="eye">Color in use</div>
    <h1 class="headline">14 days <span class="spark">to</span> new</h1>
    <a class="btn"><span class="spark"></span> Start a project</a>
  </div>
  <div class="principles">
    <div><b>Lime</b> — earned. Numerals, glow, one CTA per screen.</div>
    <div><b>Lavender</b> — soft aura. Glass, ambient blobs, underlines.</div>
    <div><b>Milk + Ink</b> — carries 90% of the page.</div>
  </div>
</div>
</body></html>
