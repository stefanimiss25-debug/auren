<!doctype html><html><head><meta charset="utf-8"/>
<title>AUREN · Neutrals</title>
<link rel="stylesheet" href="_card.css"/>
<style>
body { padding: 24px; }
.scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.s { padding: 14px 12px; border-radius: 12px; min-height: 130px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--auren-line); }
.s .name { font: 600 12px/1.2 var(--auren-sans); }
.s .hex { font: var(--auren-mono-sm); text-transform: uppercase; letter-spacing: 0.06em; }
.milk    { background: var(--auren-milk); color: var(--auren-ink); }
.milk2   { background: var(--auren-milk-2); color: var(--auren-ink); }
.milk3   { background: var(--auren-milk-3); color: var(--auren-ink); }
.silver  { background: var(--auren-silver); color: var(--auren-ink); }
.graph   { background: var(--auren-graphite); color: var(--auren-on-dark-1); border-color: transparent; }
.ink     { background: var(--auren-ink); color: var(--auren-on-dark-1); border-color: transparent; }
</style>
</head><body>
<div class="scale">
  <div class="s milk"><div class="name">Milk</div><div class="hex">#F7F5F0</div></div>
  <div class="s milk2"><div class="name">Milk 2</div><div class="hex">#EFEDE6</div></div>
  <div class="s milk3"><div class="name">Milk 3</div><div class="hex">#E4E1D8</div></div>
  <div class="s silver"><div class="name">Silver</div><div class="hex">#C8C6C0</div></div>
  <div class="s graph"><div class="name">Graphite</div><div class="hex">#2A2A2F</div></div>
  <div class="s ink"><div class="name">Ink</div><div class="hex">#0A0A0B</div></div>
</div>
</body></html>
