<!doctype html><html><head><meta charset="utf-8"/>
<title>AUREN · Manifesto</title>
<link rel="stylesheet" href="_card.css"/>
<style>
body { padding: 28px; background: var(--auren-ink); position: relative; overflow: hidden; }
body::before { content: ''; position: absolute; inset: 0; background-image: var(--auren-grain); opacity: 0.5; pointer-events: none; }
body::after {
  content: ''; position: absolute; width: 280px; height: 280px; border-radius: 50%;
  background: var(--auren-lavender-glow); filter: blur(60px); top: -60px; right: -60px; pointer-events: none;
}
.q { position: relative; z-index: 1; }
.eye { font: 500 11px/1 var(--auren-sans); letter-spacing: 0.22em; text-transform: uppercase; color: var(--auren-on-dark-2); margin-bottom: 14px; }
.head { font-family: var(--auren-display); font-size: 44px; line-height: 1.04; letter-spacing: -0.01em; color: var(--auren-on-dark-1); margin: 0; max-width: 22ch; }
.head .spark { color: var(--auren-lime); }
</style>
</head><body>
<div class="q">
  <div class="eye">Manifesto</div>
  <h1 class="head">Not a freelance marketplace.<br/><span class="spark">A creative system.</span></h1>
</div>
</body></html>
